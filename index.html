<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristi AI</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d0f14 0%, #050608 100%);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ff6b6b;
            --accent-glow: rgba(255, 107, 107, 0.4);
            --text-main: #f5f7fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; }
        
        h1, h2 { color: var(--accent); text-align: center; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; }
        input:focus, textarea:focus { border-color: var(--accent); }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #fff; transition: 0.3s; margin-bottom: 10px; }
        .btn-primary { background: var(--accent); box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-voice { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        
        /* Чат */
        .chat-box { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 14px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .msg.user { background: rgba(255,255,255,0.08); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.kristi { background: rgba(255,107,107,0.15); border: 1px solid rgba(255,107,107,0.2); align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Профиль шапка */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); }
        .avatar-wrap { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #2c2e3e; display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Модалка профиля */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-radius: 24px; padding: 30px; z-index: 10; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen" class="glass-card">
        <h1>Kristi AI</h1>
        <p style="text-align: center; color: #777; margin-bottom: 20px;">Вход или Регистрация по Username</p>
        <input type="text" id="auth-username" placeholder="Придумайте или введите Username">
        <input type="password" id="auth-password" placeholder="Пароль">
        <button class="btn-primary" onclick="login()">Продолжить</button>
    </div>

    <div id="main-screen" class="glass-card hidden" style="max-width: 600px;">
        <div class="header">
            <div class="avatar-wrap" onclick="toggleProfile()">
                <div class="avatar" id="ui-avatar">K</div>
                <div>
                    <div style="font-weight: bold; font-size: 18px;" id="ui-username">User</div>
                    <div style="font-size: 12px; color: var(--accent);" id="ui-id">ID: 000000</div>
                </div>
            </div>
            <div style="text-align: right; font-size: 12px;">
                <span id="ui-plan" style="background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px;">Тариф: Free</span>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <select id="voice-select">
                <option value="Kristi">Голос: Kristi (Мотивация)</option>
                <option value="Albi">Голос: Albi (Мягкий)</option>
                <option value="Erik">Голос: Erik (Грубый)</option>
            </select>
            <select id="mode-select">
                <option value="Fast">Fast</option><option value="Ultra" selected>Ultra</option><option value="Pro">Pro</option>
            </select>
        </div>

        <div class="chat-box" id="chat"></div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <label style="cursor: pointer; background: rgba(255,255,255,0.1); padding: 14px; border-radius: 12px;">
                📎<input type="file" id="file-upload" accept="image/*" class="hidden" onchange="handleFile()">
            </label>
            <textarea id="prompt" rows="1" placeholder="Ваш запрос..." style="margin: 0; height: 50px; resize: none;"></textarea>
            <button class="btn-primary" style="width: auto; margin: 0; padding: 0 20px;" onclick="sendMsg()">➤</button>
        </div>
        <button class="btn-voice" onclick="startLifeMode()">🎙 Life Режим</button>
    </div>

    <div id="profile-modal" class="modal">
        <h2>Настройки профиля</h2>
        <label style="display:block; text-align:center; margin-bottom:15px; cursor:pointer; color:var(--accent);">
            Изменить аватар
            <input type="file" accept="image/*" class="hidden" onchange="uploadAvatar(event)">
        </label>
        <input type="password" id="old-pass" placeholder="Старый пароль (для смены)">
        <input type="password" id="new-pass" placeholder="Новый пароль">
        <button class="btn-primary" onclick="updateProfile()">Сохранить изменения</button>
        <button style="background: transparent; border: 1px solid #fff;" onclick="toggleProfile()">Закрыть</button>
    </div>

    <script>
        let currentUser = null;
        let attachedImageBase64 = null;

        async function login() {
            const username = document.getElementById('auth-username').value;
            const password = document.getElementById('auth-password').value;
            if(!username || !password) return alert("Введите данные");

            const res = await fetch('/api/auth/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if(data.success) {
                currentUser = data.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                updateUI();
                renderHistory();
            } else { alert(data.error); }
        }

        function updateUI() {
            document.getElementById('ui-username').innerText = currentUser.username;
            document.getElementById('ui-id').innerText = currentUser.id;
            document.getElementById('ui-plan').innerText = `Тариф: ${currentUser.plan}`;
            if(currentUser.avatar) {
                document.getElementById('ui-avatar').innerHTML = `<img src="${currentUser.avatar}">`;
            } else {
                document.getElementById('ui-avatar').innerText = currentUser.username[0].toUpperCase();
            }
        }

        function renderHistory() {
            const chat = document.getElementById('chat');
            chat.innerHTML = '';
            if(currentUser.chat_history.length === 0) {
                chat.innerHTML = '<div class="msg kristi">Привет! Я Kristi. Жду твой первый запрос.</div>';
            } else {
                currentUser.chat_history.forEach(m => {
                    chat.innerHTML += `<div class="msg ${m.role}">${m.text}</div>`;
                });
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function handleFile() {
            const file = document.getElementById('file-upload').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                attachedImageBase64 = e.target.result;
                alert('Фото прикреплено!');
            };
            reader.readAsDataURL(file);
        }

        async function sendMsg() {
            const promptInput = document.getElementById('prompt');
            const prompt = promptInput.value;
            if(!prompt && !attachedImageBase64) return;

            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg user">${prompt} ${attachedImageBase64 ? '[Фото]' : ''}</div>`;
            promptInput.value = '';
            chat.scrollTop = chat.scrollHeight;

            const reqBody = { username: currentUser.username, prompt, mode: document.getElementById('mode-select').value };
            if(attachedImageBase64) reqBody.imageBase64 = attachedImageBase64;
            attachedImageBase64 = null; // Очищаем после отправки

            const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(reqBody) });
            const data = await res.json();

            if(data.answer) {
                chat.innerHTML += `<div class="msg kristi">${data.answer}</div>`;
                playVoice(data.answer);
            } else { alert(data.error); }
            chat.scrollTop = chat.scrollHeight;
        }

        function playVoice(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voice = document.getElementById('voice-select').value;
            if(voice === 'Albi') { utterance.rate = 0.9; utterance.pitch = 1.2; }
            else if(voice === 'Erik') { utterance.rate = 1.0; utterance.pitch = 0.7; }
            else { utterance.rate = 1.1; utterance.pitch = 1.0; } // Kristi
            window.speechSynthesis.speak(utterance);
        }

        function startLifeMode() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'ru-RU';
            rec.start();
            rec.onresult = (e) => { document.getElementById('prompt').value = e.results[0][0].transcript; sendMsg(); };
        }

        // Профиль
        function toggleProfile() { document.getElementById('profile-modal').classList.toggle('hidden'); }
        
        function uploadAvatar(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { currentUser.avatar = ev.target.result; document.getElementById('ui-avatar').innerHTML = `<img src="${currentUser.avatar}">`; };
            reader.readAsDataURL(e.target.files[0]);
        }

        async function updateProfile() {
            const oldPass = document.getElementById('old-pass').value;
            const newPass = document.getElementById('new-pass').value;
            const res = await fetch('/api/profile/update', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: currentUser.username, avatar: currentUser.avatar, oldPassword: oldPass, newPassword: newPass })
            });
            const data = await res.json();
            if(data.success) { alert('Сохранено!'); toggleProfile(); } else { alert(data.error); }
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    </script>
</body>
</html>
