<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Kristi Admin</title>
    <style>
        body { background: #0a0b10; color: #fff; font-family: sans-serif; padding: 40px; }
        .card { background: #12141c; padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        input, select, button { padding: 12px; margin-right: 10px; border-radius: 8px; border: none; outline: none; }
        button { background: #ff6b6b; color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stat { background: #1c1e29; padding: 20px; border-radius: 10px; text-align: center; font-size: 24px; font-weight: bold; }
        .stat span { display: block; font-size: 12px; color: #777; font-weight: normal; margin-bottom: 5px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #333; text-align: left; }
    </style>
</head>
<body>
    <div id="login" style="text-align:center; margin-top: 100px;">
        <h2>Admin Login</h2>
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="loadAdmin()">Вход</button>
    </div>

    <div id="dashboard" style="display: none;">
        <h1>Аналитика Kristi AI</h1>
        <div class="grid card">
            <div class="stat"><span>Всего юзеров</span><div id="t-users">0</div></div>
            <div class="stat"><span>Прибыль PLUS</span><div id="p-plus">0₽</div></div>
            <div class="stat"><span>Прибыль ULTRA</span><div id="p-ultra">0₽</div></div>
            <div class="stat" style="color:#00b894;"><span>Общая Прибыль</span><div id="p-total">0₽</div></div>
        </div>

        <div class="card">
            <h3>Управление тарифами</h3>
            <input type="text" id="target-user" placeholder="Username пользователя">
            <select id="target-plan">
                <option value="Free">Free</option>
                <option value="Plus">Plus</option>
                <option value="Ultra">Ultra</option>
            </select>
            <button onclick="givePlan()">Применить тариф</button>
        </div>

        <div class="card">
            <h3>База пользователей</h3>
            <table>
                <thead><tr><th>ID</th><th>Username</th><th>План</th><th>Использовано лимитов</th></tr></thead>
                <tbody id="users-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        let aPass = '';
        async function loadAdmin() {
            aPass = document.getElementById('pass').value;
            const res = await fetch('/api/admin/data', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ password: aPass }) });
            if(res.ok) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                renderData(await res.json());
            } else alert('Неверный пароль');
        }

        function renderData(data) {
            document.getElementById('t-users').innerText = data.stats.total_users;
            const plusProf = data.stats.plus_count * 200;
            const ultraProf = data.stats.ultra_count * 1000;
            document.getElementById('p-plus').innerText = plusProf + '₽';
            document.getElementById('p-ultra').innerText = ultraProf + '₽';
            document.getElementById('p-total').innerText = (plusProf + ultraProf) + '₽';

            const tb = document.getElementById('users-table');
            tb.innerHTML = '';
            data.users.forEach(u => {
                tb.innerHTML += `<tr><td>${u.id}</td><td><b>${u.username}</b></td><td style="color:#ff6b6b">${u.plan}</td><td>${u.requests}/${u.plan === 'Ultra' ? '∞' : u.limit}</td></tr>`;
            });
        }

        async function givePlan() {
            const username = document.getElementById('target-user').value;
            const plan = document.getElementById('target-plan').value;
            const res = await fetch('/api/admin/set-plan', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ password: aPass, username, plan }) });
            const data = await res.json();
            if(data.success) { alert('Успешно!'); loadAdmin(); } else alert(data.error);
        }
    </script>
</body>
</html>
