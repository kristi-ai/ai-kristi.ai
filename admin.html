<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Kristi AI Executive Panel</title>
    <style>
        :root {
            --bg-admin: #0a0b10;
            --surface-admin: #12141c;
            --border-admin: rgba(255,255,255,0.05);
            --accent-green: #00b894;
            --accent-purple: #a29bfe;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg-admin); color: #e2e8f0; padding: 40px; }
        
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-admin); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .login-box { background: var(--surface-admin); padding: 40px; border-radius: 16px; border: 1px solid var(--border-admin); text-align: center; width: 320px; }
        
        input, select, button { width: 100%; padding: 12px; background: #1c1e29; border: 1px solid var(--border-admin); color: #fff; border-radius: 8px; margin-bottom: 12px; outline: none; }
        button { background: #ff6b6b; font-weight: bold; cursor: pointer; border: none; }
        button:hover { opacity: 0.9; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--surface-admin); border: 1px solid var(--border-admin); padding: 24px; border-radius: 16px; }
        .card h3 { font-size: 13px; color: #718096; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .card p { font-size: 28px; font-weight: bold; color: #fff; }

        .main-content { background: var(--surface-admin); border: 1px solid var(--border-admin); border-radius: 16px; padding: 30px; }
        .controls { display: flex; gap: 15px; margin-bottom: 24px; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px; border-bottom: 1px solid var(--border-admin); }
        th { color: #718096; text-transform: uppercase; font-size: 12px; }
        tr:hover { background: rgba(255,255,255,0.01); }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .badge.free { background: rgba(113,128,150,0.15); color: #1a202c; }
        .badge.plus { background: rgba(162,155,254,0.2); color: var(--accent-purple); }
        .badge.ultra { background: rgba(0,184,148,0.2); color: var(--accent-green); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ВХОД В АДМИНКУ -->
    <div id="admin-login-screen" class="login-overlay">
        <div class="login-box">
            <h2 style="margin-bottom: 20px;">Kristi Admin</h2>
            <input type="password" id="admin-password-input" placeholder="Введите ключ доступа">
            <button onclick="authenticateAdminPanel()">Войти в панель</button>
        </div>
    </div>

    <!-- КОНСОЛЬ УПРАВЛЕНИЯ -->
    <div id="admin-dashboard-layout" class="hidden">
        <h1 style="margin-bottom: 30px;">Система мониторинга Kristi AI</h1>

        <div class="dashboard-grid">
            <div class="card"><h3>Всего аккаунтов</h3><p id="stat-total-users">0</p></div>
            <div class="card"><h3>Чистая Прибыль Plus</h3><p id="stat-revenue-plus">0₽</p></div>
            <div class="card"><h3>Чистая Прибыль Ultra</h3><p id="stat-revenue-ultra">0₽</p></div>
            <div class="card"><h3>Общий финансовый оборот</h3><p id="stat-total-revenue" style="color: var(--accent-green);">0₽</p></div>
        </div>

        <div class="main-content">
            <h2 style="margin-bottom: 20px;">Модификатор прав и тарифных сеток</h2>
            
            <!-- Инструменты управления -->
            <div class="controls">
                <input type="text" id="target-user-email" placeholder="E-mail адрес пользователя" style="width: 40%;">
                <select id="target-user-plan" style="width: 30%;">
                    <option value="Free">План: Free (100 запросов)</option>
                    <option value="Plus">План: Plus (200 запросов)</option>
                    <option value="Ultra">План: Ultra (Безлимит)</option>
                </select>
                <button onclick="applyPlanOverride()" style="width: 30%; background: var(--accent-green);">Обновить параметры</button>
            </div>

            <h2 style="margin-bottom: 20px; margin-top: 40px;">Реестр учетных записей базы данных</h2>
            <table id="database-users-table">
                <thead>
                    <tr>
                        <th>Имя пользователя</th>
                        <th>Email пользователя</th>
                        <th>Текущий План</th>
                        <th>Использовано лимитов</th>
                    </tr>
                </thead>
                <tbody id="table-body-target">
                    <!-- Загружается из db.json -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let verifiedPassword = "";

        async function authenticateAdminPanel() {
            const password = document.getElementById('admin-password-input').value;
            const res = await fetch('/api/admin/data', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password })
            });

            if(res.status === 200) {
                verifiedPassword = password;
                document.getElementById('admin-login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard-layout').classList.remove('hidden');
                renderDashboardData(await res.json());
            } else {
                alert("Доступ заблокирован: неверный пароль.");
            }
        }

        function renderDashboardData(data) {
            document.getElementById('stat-total-users').innerText = data.stats.total_users;
            
            // Расчет чистой прибыли на основе данных счетчиков
            const plusProfit = (data.stats.plus_count || 0) * 200;
            const ultraProfit = (data.stats.ultra_count || 0) * 1000;
            
            document.getElementById('stat-revenue-plus').innerText = plusProfit + '₽';
            document.getElementById('stat-revenue-ultra').innerText = ultraProfit + '₽';
            document.getElementById('stat-total-revenue').innerText = (plusProfit + ultraProfit) + '₽';

            const tbody = document.getElementById('table-body-target');
            tbody.innerHTML = ''; // Очистка

            data.users.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${user.username}</b></td>
                    <td>${user.email}</td>
                    <td><span class="badge ${user.plan.toLowerCase()}">${user.plan}</span></td>
                    <td>${user.requests} запросов</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function applyPlanOverride() {
            const email = document.getElementById('target-user-email').value;
            const plan = document.getElementById('target-user-plan').value;

            const res = await fetch('/api/admin/give-plan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: verifiedPassword, email, plan })
            });
            
            const result = await res.json();
            if(result.success) {
                alert("Учетная запись успешно обновлена.");
                // Перезапуск сбора данных для синхронизации интерфейса
                authenticateAdminPanel();
            } else {
                alert("Произошла ошибка: " + result.error);
            }
        }
    </script>
</body>
</html>
